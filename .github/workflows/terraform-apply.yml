name: Terraform Apply (LocalStack, sin coste)
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a aplicar contra LocalStack'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
 
permissions:
  contents: read
 
env:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: environments/${{ inputs.environment }}
 
jobs:
  apply-localstack:
    name: Terraform Apply contra LocalStack
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    services:
      localstack:
        image: localstack/localstack:3.0
        ports: ["4566:4566"]
        env:
          SERVICES: ec2,s3,iam,rds,lambda,kms,logs,sts,dynamodb,secretsmanager,cloudwatch,apigateway,scheduler,ssm,events,config,cloudtrail,guardduty,wafv2,elbv2,sns
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
 
    # Credenciales ficticias: LocalStack no valida su contenido,
    # solo necesita que existan variables con este nombre.
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-west-1
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
 
      - name: Esperar a que LocalStack esté listo
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:4566/_localstack/health && break
            echo "Esperando LocalStack ($i/20)..."
            sleep 3
          done
 
      - name: Generar override de endpoints y backend LocalStack
        run: |
          cat > ${{ env.TF_WORKING_DIR }}/localstack_override.tf <<'EOF'
          terraform {
            backend "local" {
              path = "terraform.tfstate"
            }
          }
 
          provider "aws" {
            access_key = "test"
            secret_key = "test"
 
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
 
            s3_use_path_style = true
 
            endpoints {
              acm            = "http://localhost:4566"
              apigateway     = "http://localhost:4566"
              cloudwatch     = "http://localhost:4566"
              cloudwatchlogs = "http://localhost:4566"
              cloudtrail     = "http://localhost:4566"
              config         = "http://localhost:4566"
              dlm            = "http://localhost:4566"
              dynamodb       = "http://localhost:4566"
              ec2            = "http://localhost:4566"
              elbv2          = "http://localhost:4566"
              events         = "http://localhost:4566"
              guardduty      = "http://localhost:4566"
              iam            = "http://localhost:4566"
              kms            = "http://localhost:4566"
              lambda         = "http://localhost:4566"
              rds            = "http://localhost:4566"
              s3             = "http://localhost:4566"
              scheduler      = "http://localhost:4566"
              secretsmanager = "http://localhost:4566"
              sns            = "http://localhost:4566"
              ssm            = "http://localhost:4566"
              sts            = "http://localhost:4566"
              wafv2          = "http://localhost:4566"
            }
          }
          EOF
 
      - name: Generar override de AMI dentro del módulo defectdojo
        # Un override en environments/dev NO puede sobreescribir un
        # data source declarado dentro de modules/defectdojo — cada
        # módulo resuelve sus propios *_override.tf en su propio
        # directorio. Por eso este override va físicamente dentro
        # de modules/defectdojo/, no en environments/dev/.
        run: |
          cat > modules/defectdojo/localstack_override.tf <<'EOF'
          data "aws_ami" "ubuntu_22" {
            most_recent = true
            owners      = ["self"]
 
            filter {
              name   = "name"
              values = ["ubuntu-jammy-localstack-fake*"]
            }
          }
          EOF
 
      - name: Registrar AMI falsa en LocalStack
        run: |
          aws ec2 register-image \
            --endpoint-url http://localhost:4566 \
            --name "ubuntu-jammy-localstack-fake-20260101" \
            --root-device-name /dev/sda1 \
            --virtualization-type hvm \
            --architecture x86_64 \
            --block-device-mappings "DeviceName=/dev/sda1,Ebs={VolumeSize=8}"
 
      - name: Terraform Init (backend local sobreescrito, sin S3 real)
        run: terraform init -reconfigure -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
 
      - name: Construir Lambda layer de dependencias Python
        # Documentado en README.md, sección "2. Construir la Lambda
        # layer" — automatizado aquí para que el apply no falle por
        # falta del zip.
        run: |
          mkdir -p modules/defectdojo/lambda/layer/python
          pip install requests -t modules/defectdojo/lambda/layer/python/ \
            --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.12
          cd modules/defectdojo/lambda/layer
          zip -r python-deps.zip python/
 
      - name: Terraform Plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            -var="acm_certificate_arn=arn:aws:acm:eu-west-1:000000000000:certificate/test-fake-cert" \
            -var="alarm_email=test@empresa.com" \
            -var="internal_domain=empresa.internal"
        working-directory: ${{ env.TF_WORKING_DIR }}
 
      - name: Terraform Apply (contra LocalStack)
        run: |
          terraform apply -no-color -input=false -auto-approve tfplan \
            2>&1 | tee /tmp/apply-output.txt
        working-directory: ${{ env.TF_WORKING_DIR }}
 
      - name: Extraer outputs
        if: success()
        run: terraform output -json > /tmp/tf-outputs.json
        working-directory: ${{ env.TF_WORKING_DIR }}
 
      - name: Subir evidencia (log de apply + outputs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: localstack-apply-evidence
          path: |
            /tmp/apply-output.txt
            /tmp/tf-outputs.json
          retention-days: 30
