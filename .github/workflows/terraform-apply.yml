# ============================================================
# terraform-apply.yml
# Trigger: push a main (tras merge de PR aprobado)
# Jobs: apply con aprobación manual en prod
# ISO 27001: A.14.2.2 — control de cambios en producción
# ============================================================

name: Terraform Apply

on:
  push:
    branches: [main]
    paths: ['**.tf', '**.tfvars']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a desplegar'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]
      confirm:
        description: 'Confirmar apply en producción (escribe CONFIRM)'
        required: true

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-west-1"

jobs:
  # ── Job 1: Plan previo (siempre) ─────────────────────────
  pre-apply-plan:
    name: Pre-Apply Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod-plan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TERRAFORM }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply

      - name: Terraform Init
        run: terraform init -backend=true -reconfigure -input=false
        working-directory: environments/prod

      - name: Terraform Plan (pre-apply)
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            -var="acm_certificate_arn=${{ secrets.ACM_CERT_ARN }}" \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -var="internal_domain=${{ secrets.INTERNAL_DOMAIN }}"
        working-directory: environments/prod

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environments/prod/tfplan
          retention-days: 1

  # ── Job 2: Aprobación manual requerida ───────────────────
  manual-approval:
    name: Aprobación Manual
    runs-on: ubuntu-latest
    needs: pre-apply-plan
    environment: prod-apply
    # Configurar en: Settings → Environments → prod-apply
    # → Required reviewers: equipo-seguridad

    steps:
      - name: Confirmación recibida
        run: |
          echo "Apply aprobado por: ${{ github.actor }}"
          echo "Timestamp: $(date -u)"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.confirm }}" != "CONFIRM" ]]; then
              echo "Debes escribir CONFIRM para aplicar en producción"
              exit 1
            fi
          fi

  # ── Job 3: Apply ──────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [pre-apply-plan, manual-approval]
    timeout-minutes: 60
    environment: prod-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TERRAFORM }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-prod

      - name: Terraform Init
        run: terraform init -backend=true -reconfigure -input=false
        working-directory: environments/prod

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environments/prod

      - name: Terraform Apply
        run: |
          terraform apply \
            -no-color \
            -input=false \
            -auto-approve \
            tfplan \
            2>&1 | tee /tmp/apply-output.txt
        working-directory: environments/prod

      - name: Extraer outputs
        if: success()
        run: |
          terraform output -json > /tmp/tf-outputs.json
          echo "DefectDojo URL: $(terraform output -raw defectdojo_dashboard_url 2>/dev/null || echo 'N/A')"
        working-directory: environments/prod

      - name: Health Check DefectDojo
        if: success()
        env:
          DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DD_BASE_URL: ${{ secrets.DEFECTDOJO_URL }}
        run: |
          echo "Esperando 60s para que DefectDojo arranque..."
          sleep 60

          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "$DD_BASE_URL/api/v2/users/?format=json" \
            -H "Authorization: Token $DD_API_KEY" || echo "000")

          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "401" ]]; then
            echo "DefectDojo responde (HTTP $HTTP_CODE)"
          else
            echo "DefectDojo no responde (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Notificar resultado Apply
        if: always()
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          STATUS="${{ job.status }}"

          aws sns publish \
            --topic-arn "${{ secrets.SNS_ALERTS_ARN }}" \
            --message "Terraform Apply $STATUS en prod | Actor: ${{ github.actor }} | Commit: ${{ github.sha }}" \
            --subject "[$STATUS] Terraform Apply prod" \
            || true
