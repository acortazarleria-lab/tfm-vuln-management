# ============================================================
# security-scan.yml
# Trigger: pull_request hacia main/develop + ejecución manual
# Escaneo continuo de la PLATAFORMA (producto DefectDojo):
#   Trivy (SCA/vuln), Dependency-Track (SBOM), Semgrep (SAST),
#   OWASP ZAP (DAST).
# ============================================================

name: Security Scan → DefectDojo

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  AWS_REGION: "eu-west-1"
  PYTHON_VERSION: "3.12"
  TARGET_URL: ${{ secrets.DEFECTDOJO_APP_URL }}

jobs:
  # ── Job 1: Trivy ─────────────────────────────────────────
  trivy-scan:
    name: Trivy SCA + IaC
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Trivy — Filesystem scan (SBOM)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: '/tmp/trivy-fs-sbom.json'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: false
          exit-code: '0'

      # Scan de la imagen del propio DefectDojo → SARIF a GitHub
      # Security (NO a DefectDojo). Rompe la última circularidad:
      # la plataforma ya no reporta sus propias vulns contra sí misma.
      - name: Trivy — Docker image scan (SARIF, no DefectDojo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'defectdojo/defectdojo-django:latest'
          format: 'sarif'
          output: '/tmp/trivy-image.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload image SARIF → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: /tmp/trivy-image.sarif
          category: trivy-image

      - name: Trivy — IaC scan (SARIF, no DefectDojo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: '/tmp/trivy-iac.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload IaC SARIF → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: /tmp/trivy-iac.sarif
          category: trivy-iac

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install requests boto3

      - name: Trivy findings como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-findings
          path: |
            /tmp/trivy-fs-sbom.json
            /tmp/trivy-image.sarif
            /tmp/trivy-iac.sarif
          retention-days: 30

  # ── Job 2: Dependency-Track SBOM ─────────────────────────
  dependency-track:
    name: SBOM - Export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trivy-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate CycloneDX SBOM
        run: |
          pip install cyclonedx-bom requests
          cyclonedx-py environment --output-format JSON --output-file /tmp/project-sbom.json

      - name: DTrack SBOM como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dtrack-sbom
          path: /tmp/project-sbom.json
          retention-days: 30

  # ── Job 3: SAST — Semgrep ────────────────────────────────
  sast-semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/python
            p/terraform
            p/secrets
            p/docker-compose
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep SARIF → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Semgrep SARIF como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

  check-target:
    name: Comprobar disponibilidad de target DAST
    runs-on: ubuntu-latest
    outputs:
      has-target: ${{ steps.check.outputs.has-target }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.DEFECTDOJO_APP_URL }}" ]; then
            echo "has-target=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-target=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DEFECTDOJO_APP_URL no está configurado; el job dast-zap se omitirá."
          fi

  dast-zap:
    name: OWASP ZAP DAST → DefectDojo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-target
    if: (github.base_ref == 'main' || github.event_name == 'workflow_dispatch') && needs.check-target.outputs.has-target == 'true'
    steps:
      - uses: actions/checkout@v4
 
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: >
            -z "-config scanner.maxScanDurationInMins=10
                -config spider.maxDepth=5
                -config spider.maxChildren=20"
          fail_action: false
          allow_issue_writing: false
 
      - name: Upload ZAP report → DefectDojo (best-effort)
        if: always()
        continue-on-error: true
        env:
          DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DD_BASE_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_APP_URL: ${{ secrets.DEFECTDOJO_APP_URL }}
        run: |
          pip install requests -q
          python3 << 'PYTHON'
          import os, datetime, glob, requests
          reports=glob.glob('*zap*.xml')+glob.glob('report_xml.xml')
          if not reports:
              print("No se encontró reporte ZAP"); raise SystemExit(0)
          DD_TOKEN=os.environ['DD_API_KEY']; DD_BASE_URL=os.environ['DD_BASE_URL']
          TODAY=datetime.date.today().isoformat()
          hdr={"Authorization": f"Token {DD_TOKEN}"}
          res=requests.get(f"{DD_BASE_URL}/api/v2/engagements/", headers=hdr,
                params={"name":"DAST Continuous Scan","status":"In Progress"}, timeout=20).json().get('results',[])
          if not res:
              print("ERROR: Engagement DAST no encontrado"); raise SystemExit(0)
          eng=res[0]['id']
          with open(reports[0],'rb') as f:
              r=requests.post(f"{DD_BASE_URL}/api/v2/import-scan/", headers=hdr,
                    data={"scan_type":"ZAP Scan","engagement":eng,"active":True,"verified":False,
                          "scan_date":TODAY,"tags":"zap,dast,baseline","close_old_findings":True,
                          "minimum_severity":"Medium","endpoint_to_add":os.environ.get('DEFECTDOJO_APP_URL','')},
                    files={"file":("zap-report.xml", f, "application/xml")}, timeout=60)
          print(("OK" if r.status_code in (200,201) else "ERROR"), "ZAP→DD", r.status_code)
          PYTHON
 
      - name: ZAP report como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            *zap*.xml
            report_xml.xml
          retention-days: 30
          if-no-files-found: ignore
